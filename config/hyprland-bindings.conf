# hypr-spotlight: override default SUPER+1-9 workspace bindings
unbind = SUPER, SPACE
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

# Navigate screens within current project (SUPER + 1/2/3)
bindd = SUPER, code:10, Screen 1, exec, hypr-spotlight go 1
bindd = SUPER, code:11, Screen 2, exec, hypr-spotlight go 2
bindd = SUPER, code:12, Screen 3, exec, hypr-spotlight go 3

# Move window to screen within current project (SUPER + SHIFT + 1/2/3)
bindd = SUPER SHIFT, code:10, Move to screen 1, exec, hypr-spotlight move 1
bindd = SUPER SHIFT, code:11, Move to screen 2, exec, hypr-spotlight move 2
bindd = SUPER SHIFT, code:12, Move to screen 3, exec, hypr-spotlight move 3

# Navigate remaining screens within current project (SUPER + 4-0)
bindd = SUPER, code:13, Screen 4, exec, hypr-spotlight go 4
bindd = SUPER, code:14, Screen 5, exec, hypr-spotlight go 5
bindd = SUPER, code:15, Screen 6, exec, hypr-spotlight go 6
bindd = SUPER, code:16, Screen 7, exec, hypr-spotlight go 7
bindd = SUPER, code:17, Screen 8, exec, hypr-spotlight go 8
bindd = SUPER, code:18, Screen 9, exec, hypr-spotlight go 9
bindd = SUPER, code:19, Screen 10, exec, hypr-spotlight go 10
bindd = SUPER SHIFT, code:13, Move to screen 4, exec, hypr-spotlight move 4
bindd = SUPER SHIFT, code:14, Move to screen 5, exec, hypr-spotlight move 5
bindd = SUPER SHIFT, code:15, Move to screen 6, exec, hypr-spotlight move 6
bindd = SUPER SHIFT, code:16, Move to screen 7, exec, hypr-spotlight move 7
bindd = SUPER SHIFT, code:17, Move to screen 8, exec, hypr-spotlight move 8
bindd = SUPER SHIFT, code:18, Move to screen 9, exec, hypr-spotlight move 9
bindd = SUPER SHIFT, code:19, Move to screen 10, exec, hypr-spotlight move 10

# Project management
bindd = SUPER, SPACE, Spotlight, exec, hypr-spotlight find
bindd = SUPER SHIFT, R, Rename current window, exec, hypr-spotlight name-window
bindd = SUPER ALT, N, New project, exec, hypr-spotlight create
bindd = SUPER ALT, P, Switch project, exec, hypr-spotlight switch
bindd = SUPER ALT, W, Close project, exec, hypr-spotlight close
bindd = SUPER ALT, R, Rename current project, exec, hypr-spotlight name
bindd = SUPER ALT, UP, Previous project on current screen, exec, hypr-spotlight project-screen-prev
bindd = SUPER ALT, DOWN, Next project on current screen, exec, hypr-spotlight project-screen-next
bindd = SUPER ALT, LEFT, Previous screen in current project, exec, hypr-spotlight screen-prev
bindd = SUPER ALT, RIGHT, Next screen in current project, exec, hypr-spotlight screen-next
unbind = SUPER, mouse_down
unbind = SUPER, mouse_up
bindd = SUPER, mouse_down, Next project, exec, hypr-spotlight next
bindd = SUPER, mouse_up, Previous project, exec, hypr-spotlight prev

# Quick switch project by index (SUPER + ALT + 1-9)
bindd = SUPER ALT, code:10, Project 1, exec, hypr-spotlight switch-index 1
bindd = SUPER ALT, code:11, Project 2, exec, hypr-spotlight switch-index 2
bindd = SUPER ALT, code:12, Project 3, exec, hypr-spotlight switch-index 3
bindd = SUPER ALT, code:13, Project 4, exec, hypr-spotlight switch-index 4
bindd = SUPER ALT, code:14, Project 5, exec, hypr-spotlight switch-index 5
bindd = SUPER ALT, code:15, Project 6, exec, hypr-spotlight switch-index 6
bindd = SUPER ALT, code:16, Project 7, exec, hypr-spotlight switch-index 7
bindd = SUPER ALT, code:17, Project 8, exec, hypr-spotlight switch-index 8
bindd = SUPER ALT, code:18, Project 9, exec, hypr-spotlight switch-index 9

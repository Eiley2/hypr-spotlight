# hypr-project: override default SUPER+1-9 workspace bindings
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

# Navigate screens within current project (SUPER + 1/2/3)
bindd = SUPER, code:10, Screen 1, exec, hypr-project go 1
bindd = SUPER, code:11, Screen 2, exec, hypr-project go 2
bindd = SUPER, code:12, Screen 3, exec, hypr-project go 3

# Move window to screen within current project (SUPER + SHIFT + 1/2/3)
bindd = SUPER SHIFT, code:10, Move to screen 1, exec, hypr-project move 1
bindd = SUPER SHIFT, code:11, Move to screen 2, exec, hypr-project move 2
bindd = SUPER SHIFT, code:12, Move to screen 3, exec, hypr-project move 3

# Project management
bindd = SUPER ALT, N, New project, exec, hypr-project create
bindd = SUPER ALT, P, Switch project, exec, hypr-project switch
bindd = SUPER ALT, W, Close project, exec, hypr-project close

# Quick switch project by index (SUPER + ALT + 1-9)
bindd = SUPER ALT, code:10, Project 1, exec, hypr-project switch-index 1
bindd = SUPER ALT, code:11, Project 2, exec, hypr-project switch-index 2
bindd = SUPER ALT, code:12, Project 3, exec, hypr-project switch-index 3
bindd = SUPER ALT, code:13, Project 4, exec, hypr-project switch-index 4
bindd = SUPER ALT, code:14, Project 5, exec, hypr-project switch-index 5
bindd = SUPER ALT, code:15, Project 6, exec, hypr-project switch-index 6
bindd = SUPER ALT, code:16, Project 7, exec, hypr-project switch-index 7
bindd = SUPER ALT, code:17, Project 8, exec, hypr-project switch-index 8
bindd = SUPER ALT, code:18, Project 9, exec, hypr-project switch-index 9
